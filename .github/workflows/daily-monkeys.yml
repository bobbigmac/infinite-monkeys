name: Daily monkeys

# Disabled by default. To enable the daily run:
# 1. Add repository secret LLM_API_KEY
# 2. Add repository variables LLM_MODEL and LLM_ENDPOINT
# 3. Uncomment the schedule block below
on:
  # schedule:
  #   - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  monkey:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Check LLM_API_KEY secret
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          if [ -z "$LLM_API_KEY" ]; then
            echo "::error::LLM_API_KEY repository secret is not configured."
            exit 1
          fi

      - name: Check model and endpoint variables
        env:
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_ENDPOINT: ${{ vars.LLM_ENDPOINT }}
        run: |
          if [ -z "$LLM_MODEL" ]; then
            echo "::error::LLM_MODEL repository variable is not configured."
            exit 1
          fi
          if [ -z "$LLM_ENDPOINT" ]; then
            echo "::error::LLM_ENDPOINT repository variable is not configured."
            exit 1
          fi

      - run: npm ci

      - name: Ask the monkeys
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_ENDPOINT: ${{ vars.LLM_ENDPOINT }}
        run: npm run monkey

      - name: Build site
        run: npm run build-site

      - name: Commit daily log
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add logs/ docs/data/
          git diff --staged --quiet || git commit -m "Daily monkey run $(date -u +%F)"
          git push
